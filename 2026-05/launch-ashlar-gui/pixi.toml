[workspace]
authors = ["Yu-An Chen <atwood12@gmail.com>"]
channels = ["conda-forge"]
name = "pixi-env"
platforms = ["osx-arm64", "win-64", "linux-64"]
version = "0.1.0"

[tasks]

[dependencies]
python = "3.10.*"
pip = ">=25.2,<26"
openjdk = ">=21,<22"
pyqt = ">=5.15.11,<6"
asciitree = ">=0.3.3,<0.4"

[target.win-64.dependencies]
pyjnius = ">=1.6.1,<2"

[target.win-64.pypi-dependencies]
pywin32 = ">=311, <312"

[target.linux-64.dependencies]
pyjnius = ">=1.6.1,<2"

[pypi-dependencies]
ashlar = { git = "https://github.com/Yu-AnChen/ashlar.git", rev = "bf8c3326f6230c1b1d474256e4d49095b914d865" }
palom = ">=2025.7"
